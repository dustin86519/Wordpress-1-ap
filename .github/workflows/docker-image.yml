name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'   # 推 v1.0.0 這類 tag 時也會觸發
  pull_request:
    branches:
      - main       # PR 時只 build，不 push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # 例：your-user/github-action-test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 允許推送到 ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 設定 QEMU（若需要 multi-platform build，如 arm64）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 啟用 Docker Buildx（支援 cache、multi-platform）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登入 GitHub Container Registry
      # PR 時不登入（也不會 push）
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 自動產生 tags 和 labels
      # main branch → latest + sha-xxxxxxx
      # v1.2.3 tag  → 1.2.3 + 1.2 + 1 + latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build & Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # 視需要移除 arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 利用 GitHub Actions cache 加速二次 build
          cache-from: type=gha
          cache-to: type=gha,mode=max
