name: Build & Deploy WordPress AP Image

on:
  push:
    branches:
      - main          # 推到 main 分支自動觸發
      - v6

env:
  AWS_REGION:       ap-east-2
  ECR_REGISTRY:     713872021760.dkr.ecr.ap-east-2.amazonaws.com
  ECR_REPOSITORY:   cloud-store-wp-image
  CONTAINER_NAME:   wp-ap                       # EC2 上的容器名稱

jobs:
  # ============================================================
  # Job 1：Build Image → Push to ECR
  # ============================================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "IMAGE_TAG=${BRANCH}-${SHA}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: ./  # Dockerfile 位於專案根目錄
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

          echo "Building image: $IMAGE_URI"
          docker build -t $IMAGE_URI .

          echo "Pushing image to ECR..."
          docker push $IMAGE_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Image pushed successfully
        run: echo "✅ Image pushed -> ${{ steps.build-image.outputs.image }}"

  # ============================================================
  # Job 2：透過 AWS SSM 進 EC2 → Pull 最新 Image → 重啟容器
  # ============================================================
  deploy-to-ec2:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push    # 必須等 build-and-push 成功才執行

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSM Send-Command
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy wp-ap from GitHub Actions" \
            --parameters 'commands=[
              "set -e",
              "IMAGE_URI=\"${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}\"",
              "CONTAINER=\"${{ env.CONTAINER_NAME }}\"",
              "echo === 1. 登入 AWS ECR ===",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "echo === 2. 拉取最新 Image ===",
              "docker pull $IMAGE_URI",
              "echo === 3. 停止並移除舊容器（若存在）===",
              "docker stop $CONTAINER 2>/dev/null || true",
              "docker rm $CONTAINER 2>/dev/null || true",
              "echo === 4. 啟動新容器 ===",
              "docker run -d --name $CONTAINER -p 9000:9000 -e AWS_S3_BUCKET=\"${{ secrets.AWS_S3_BUCKET }}\" -e DB_NAME=\"${{ secrets.DB_NAME }}\" -e DB_USER=\"${{ secrets.DB_USER }}\" -e DB_PASSWORD=\"${{ secrets.DB_PASSWORD }}\" -e DB_MASTER_HOST=\"${{ secrets.DB_MASTER_HOST }}\" -e DB_SLAVE_HOST=\"${{ secrets.DB_SLAVE_HOST }}\" -e WP_AUTH_KEY=\"${{ secrets.WP_AUTH_KEY }}\" -e WP_SECURE_AUTH_KEY=\"${{ secrets.WP_SECURE_AUTH_KEY }}\" -e WP_LOGGED_IN_KEY=\"${{ secrets.WP_LOGGED_IN_KEY }}\" -e WP_NONCE_KEY=\"${{ secrets.WP_NONCE_KEY }}\" -e WP_AUTH_SALT=\"${{ secrets.WP_AUTH_SALT }}\" -e WP_SECURE_AUTH_SALT=\"${{ secrets.WP_SECURE_AUTH_SALT }}\" -e WP_LOGGED_IN_SALT=\"${{ secrets.WP_LOGGED_IN_SALT }}\" -e WP_NONCE_SALT=\"${{ secrets.WP_NONCE_SALT }}\" --restart always $IMAGE_URI",
              "echo === 5. 清理舊 Images ===",
              "docker image prune -f",
              "echo === 完成 ===",
              "docker ps | grep $CONTAINER"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM command to complete
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          echo "等待 SSM 指令執行完成（Command ID: $COMMAND_ID）..."

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/30] 目前狀態: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ 部署成功！"
              # 印出 EC2 執行 log
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ 部署失敗，狀態: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "❌ 等待逾時（超過 300 秒）"
          exit 1
